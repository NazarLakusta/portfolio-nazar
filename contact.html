<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакти | Nazar Lakusta</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        /* Базові стилі */
        :root { --bg: #111111; --text-main: #EAEAEA; --accent: #ffffff; --font-head: 'Playfair Display', serif; --font-body: 'Manrope', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background: var(--bg); color: var(--text-main); font-family: var(--font-body); overflow-x: hidden; height: 100vh; }
        
        /* Встав стилі хедера і курсора */

        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100vh;
            padding-top: 10vh; /* відступ під меню */
        }

        /* ЛІВА ЧАСТИНА: Контакти */
        .contact-info { padding: 10vh 5vw; display: flex; flex-direction: column; justify-content: center; }
        .contact-info h1 { font-family: var(--font-head); font-size: clamp(3rem, 6vw, 6rem); font-weight: 400; margin-bottom: 2rem; line-height: 1; }
        
        /* Ультра-стильні посилання */
        .social-mega { display: flex; flex-direction: column; gap: 1rem; margin-top: 3rem; }
        .social-mega a {
            font-family: var(--font-head); font-size: clamp(2rem, 4vw, 4rem); 
            color: transparent; -webkit-text-stroke: 1px var(--text-main); /* Прозорий текст з контуром */
            text-transform: uppercase; transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: inline-block; width: fit-content;
        }
        .social-mega a:hover {
            color: var(--text-main); -webkit-text-stroke: 0px; transform: translateX(20px); font-style: italic;
        }

        /* ПРАВА ЧАСТИНА: Фото */
        .contact-photo {
            position: relative; height: 100%; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .img-reveal-wrapper {
            width: 70%; height: 80%; border-radius: 10px; overflow: hidden;
            clip-path: polygon(0 100%, 100% 100%, 100% 100%, 0% 100%); /* Початковий стан для GSAP */
        }
        .img-reveal-wrapper img { width: 100%; height: 100%; object-fit: cover; transform: scale(1.2); }

        @media (max-width: 768px) {
            .contact-wrapper { grid-template-columns: 1fr; height: auto; }
            .contact-photo { height: 60vh; order: -1; margin-top: 10vh; }
            .img-reveal-wrapper { width: 90%; }
        }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <div class="contact-wrapper">
        <div class="contact-info">
            <h1 class="fade-up">Let's create<br>something<br>beautiful.</h1>
            <a href="mailto:your@email.com" class="hover-target" style="font-size: 1.2rem; color: #888; margin-top: 1rem;">nazar.lakusta@email.com</a>
            
            <div class="social-mega">
                <a href="https://www.instagram.com/nl.archviz/" class="hover-target fade-up">Instagram</a>
                <a href="https://t.me/nazarko_1703" class="hover-target fade-up">Telegram</a>
                <a href="https://www.behance.net/4570e1c5" class="hover-target fade-up">Behance</a>
            </div>
        </div>
        
        <div class="contact-photo">
            <div class="img-reveal-wrapper">
                <img src="img/me.jpg" alt="Nazar Lakusta" class="photo-parallax">
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // Анімації при завантаженні сторінки контактів
        window.onload = () => {
            // Поява фото знизу вгору (ефект шторки)
            gsap.to(".img-reveal-wrapper", {
                clipPath: "polygon(0 0, 100% 0, 100% 100%, 0 100%)", duration: 1.5, ease: "power4.inOut"
            });
            // Ефект Parallax для самого фото всередині маски
            gsap.to(".photo-parallax", {
                scale: 1, duration: 2, ease: "power3.out"
            });
            // Поява тексту зліва
            gsap.fromTo(".fade-up", 
                { opacity: 0, y: 50 }, 
                { opacity: 1, y: 0, duration: 1, stagger: 0.15, ease: "power3.out", delay: 0.5 }
            );
        };
        // Додай сюди логіку курсора
    </script>
</body>
</html>
